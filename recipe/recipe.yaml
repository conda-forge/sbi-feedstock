schema_version: 1

context:
  version: "0.26.0"
  python_min: "3.10"

package:
  name: sbi
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/s/sbi/sbi-${{ version }}.tar.gz
  sha256: 92e69f0a8ab59c9fe6ca635c5946024fbcd5ca539f7cf7191bf834d424062a34

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python ${{ python_min }}.*
    - setuptools >=65
    - pip
  run:
    - python >=${{ python_min }}
    - joblib >=1.0.0
    - matplotlib-base
    - numpy
    - pillow
    - nflows >=0.14.0
    - pymc >=5.0.0
    - pyro-ppl >=1.3.1
    - scikit-learn
    - scipy
    - skorch
    - tensorboard
    - pytorch >=1.13.0
    - tqdm
    - zuko >=1.2.0

tests:
  - python:
      imports:
        - sbi
      pip_check: true
      python_version:
        - ${{ python_min }}.*
        - "*"

about:
  summary: Simulation-based inference.
  license: Apache-2.0
  license_file: LICENSE.txt
  homepage: https://github.com/sbi-dev/sbi
  repository: https://github.com/sbi-dev/sbi
  documentation: https://sbi-dev.github.io/sbi/

extra:
  recipe-maintainers:
    - janfb
    - matthewfeickert
